# CommandFlow build targets. Minecraft compatibility range 1.21.6 .. 26.2.
#
# Selected with -Ptarget=mcXXXX (default below). Values mirror the MagicUtils
# targets.properties so the MagicUtils classifier (mc<major.minor>) and the
# Loom obfuscation mode (deobfuscated on 26.x) line up with the resolved
# MagicUtils artifacts.
#
# mc<major.minor> classifier per target:
#   mc12111 -> mc1.21   (obfuscated, Mojang mappings + Loom remap, Java 21)
#   mc262   -> mc26     (deobfuscated, no-remap, Java 25)
target=mc12111

mc12111.minecraft=1.21.11
mc12111.java=21
mc12111.yarn=1.21.11+build.4
mc12111.loader=0.18.4
mc12111.fabric_api=0.141.4+1.21.11
mc12111.paper=1.21.11-R0.1-SNAPSHOT

mc2611.minecraft=26.1.1
mc2611.java=25
mc2611.yarn=1.21.11+build.4
mc2611.loader=0.19.2
mc2611.fabric_api=0.154.0+26.1.2
mc2611.paper=26.1.1.build.29-alpha

mc262.minecraft=26.2
mc262.java=25
mc262.yarn=1.21.11+build.4
mc262.loader=0.19.3
mc262.fabric_api=0.154.0+26.2
mc262.paper=26.2.build.40-alpha
